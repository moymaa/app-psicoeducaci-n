<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación de Citas · Eutimya</title>
<link rel="apple-touch-icon" href="https://psiquiatra-cdmx.eutimya.org/favicon.png">
<link rel="icon" type="image/png" href="https://psiquiatra-cdmx.eutimya.org/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0D1B2A;
    --teal: #006A60;
    --teal-light: #E9F0EE;
    --gold: #C9A84C;
    --bg: #F7F8F6;
    --card: #ffffff;
    --text: #1A1A1A;
    --muted: #5A6472;
    --border: #E2E8E4;
    --presencial: #E8F5E9;
    --presencial-dot: #2E7D32;
    --online: #E3F2FD;
    --online-dot: #1565C0;
    --bariatria: #FFF3E0;
    --bariatria-dot: #E65100;
    --moya: #E8EAF6;
    --moya-dot: #283593;
    --sharon: #FCE4EC;
    --sharon-dot: #880E4F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .login-card {
    background: var(--card); border-radius: 20px; padding: 48px 40px;
    max-width: 380px; width: 100%;
    box-shadow: 0 4px 40px rgba(0,0,0,.10);
    text-align: center;
  }
  .login-logo { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--navy); margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 36px; }
  .login-label { display: block; text-align: left; font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
  .login-input {
    width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border .2s;
  }
  .login-input:focus { border-color: var(--teal); }
  .login-btn {
    margin-top: 20px; width: 100%; padding: 14px;
    background: var(--navy); color: #fff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: background .2s;
  }
  .login-btn:hover { background: var(--teal); }
  .login-error { display: none; color: #c62828; font-size: 13px; margin-top: 12px; }

  /* ── APP ── */
  #app { display: none; }
  header {
    background: var(--navy); color: #fff; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-family: 'Playfair Display', serif; font-size: 20px; }
  .header-sub { font-size: 12px; opacity: .65; margin-top: 2px; }
  .header-badge {
    background: var(--gold); color: var(--navy); padding: 6px 14px;
    border-radius: 20px; font-size: 13px; font-weight: 600;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  /* filtros */
  .filters {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .filter-btn {
    padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--border); background: var(--card); cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all .15s;
  }
  .filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .filter-btn:hover:not(.active) { border-color: var(--teal); color: var(--teal); }


  /* grupos de día — colapsables */
  .day-chevron {
    font-size: 12px; color: var(--muted);
    transition: transform .22s ease; display: inline-block; margin-right: 2px;
  }
  .day-group.collapsed .day-chevron { transform: rotate(-90deg); }
  .day-cards { padding-top: 10px; margin-bottom: 8px; }
  .day-group.collapsed .day-cards { display: none; }
  .day-done .day-header { border-bottom-color: #4CAF50; }
  .day-done .day-chevron { color: #4CAF50; }
  /* grupos de día */
  .day-group { margin-bottom: 32px; }
  .day-header {
    font-family: 'Playfair Display', serif; font-size: 17px; color: var(--navy);
    border-bottom: 2px solid var(--border); padding-bottom: 8px; margin-bottom: 0;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none; padding: 10px 4px;
    border-radius: 8px; transition: background .15s;
  }
  .day-header:hover { background: rgba(13,27,42,.04); }
  .day-count { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: var(--muted); margin-left: auto; }

  /* cards */
  .cita-card {
    background: var(--card); border-radius: 14px; padding: 16px 18px;
    margin-bottom: 10px; border: 1.5px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    transition: box-shadow .15s;
  }
  .cita-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .cita-hora {
    font-size: 15px; font-weight: 600; color: var(--navy);
    min-width: 52px; text-align: center; line-height: 1.2;
  }
  .cita-hora span { display: block; font-size: 11px; font-weight: 400; color: var(--muted); }
  .divider { width: 1px; height: 40px; background: var(--border); }
  .cita-info { flex: 1; min-width: 0; }
  .cita-nombre { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cita-meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge-presencial { background: var(--presencial); color: var(--presencial-dot); }
  .badge-presencial .badge-dot { background: var(--presencial-dot); }
  .badge-online { background: var(--online); color: var(--online-dot); }
  .badge-online .badge-dot { background: var(--online-dot); }
  .badge-bariatria { background: var(--bariatria); color: var(--bariatria-dot); }
  .badge-bariatria .badge-dot { background: var(--bariatria-dot); }
  .badge-moya { background: var(--moya); color: var(--moya-dot); }
  .badge-moya .badge-dot { background: var(--moya-dot); }
  .badge-sharon { background: var(--sharon); color: var(--sharon-dot); }
  .badge-sharon .badge-dot { background: var(--sharon-dot); }
  .cita-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-wa {
    background: #25D366; color: #fff; border: none;
    padding: 10px 14px; border-radius: 10px; font-size: 13px;
    font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    text-decoration: none; transition: background .15s;
  }
  .btn-wa:hover { background: #1ebe5d; }
  .btn-copy {
    background: var(--teal-light); color: var(--teal); border: 1.5px solid var(--teal);
    padding: 10px 14px; border-radius: 10px; font-size: 13px;
    font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all .15s;
  }
  .btn-copy:hover { background: var(--teal); color: #fff; }
  .btn-copy.copied {
    background: #9E9E9E; color: #fff; border-color: #bbb;
    opacity: 0.72; cursor: default;
  }

  /* sin cel */
  .no-cel { opacity: .4; font-size: 11px; color: var(--muted); }

  /* meet link */
  .meet-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--online-dot); background: var(--online);
    padding: 2px 7px; border-radius: 8px; max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-weight: 500;
  }
  .meet-link-missing {
    font-size: 11px; color: #c62828; background: #FFEBEE;
    padding: 2px 7px; border-radius: 8px; font-weight: 500;
  }

  /* toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--navy); color: #fff; padding: 12px 24px; border-radius: 30px;
    font-size: 14px; font-weight: 500; z-index: 999;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── BOTÓN FLOTANTE REFRESH ── */
  #btn-refresh {
    position: fixed; bottom: 24px; right: 20px; z-index: 998;
    background: var(--teal); color: #fff; border: none;
    width: 52px; height: 52px; border-radius: 50%;
    font-size: 20px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,106,96,.35);
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .2s;
  }
  #btn-refresh:hover { background: var(--navy); transform: scale(1.08); }
  #btn-refresh.spinning svg { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }


  /* stats */
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat {
    background: var(--card); border-radius: 12px; padding: 12px 18px;
    border: 1.5px solid var(--border); font-size: 13px; color: var(--muted);
  }
  .stat strong { display: block; font-size: 22px; font-weight: 600; color: var(--navy); }

  /* hidden via filtro */
  .cita-card.hidden, .day-group.hidden { display: none; }

  @media (max-width: 600px) {
    .cita-card { flex-wrap: wrap; }
    .cita-actions { width: 100%; justify-content: flex-end; }
    .login-card { padding: 36px 24px; }
  }

  .remember-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted); cursor: pointer;
    margin: 12px 0 4px; text-align: left;
  }
  .remember-label input[type="checkbox"] {
    width: 15px; height: 15px; accent-color: var(--teal);
    cursor: pointer; flex-shrink: 0;
  }

  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Eutimya</div>
    <div class="login-sub">Panel de confirmación de citas</div>
    <label class="login-label">Contraseña</label>
    <input id="pwd-input" class="login-input" type="password" placeholder="••••••••••••" autocomplete="current-password">
    <label class="remember-label">
      <input type="checkbox" id="remember-me">
      <span>Recordar en este dispositivo (30 días)</span>
    </label>
    <button class="login-btn" onclick="checkLogin()">Entrar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header>
    <div>
      <div class="header-title">Confirmación de Citas</div>
      <div class="header-sub">Semana del 9 al 16 de abril 2026</div>
    </div>
    <div class="header-badge" id="total-badge">78 citas</div>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat"><strong id="stat-total">78</strong>Total semana</div>
      <div class="stat"><strong id="stat-moya">—</strong>Dr. Moya</div>
      <div class="stat"><strong id="stat-sharon">—</strong>Dra. Venecia</div>
      <div class="stat"><strong id="stat-presencial">—</strong>Presencial</div>
      <div class="stat"><strong id="stat-online">—</strong>Online</div>
      <div class="stat"><strong id="stat-bariatria">—</strong>Bariatría</div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
      <button class="filter-btn" onclick="filtrar('Dr. Moya', this)">Dr. Moya</button>
      <button class="filter-btn" onclick="filtrar('Dra. Venecia', this)">Dra. Venecia</button>
      <button class="filter-btn" onclick="filtrar('Presencial', this)">Presencial</button>
      <button class="filter-btn" onclick="filtrar('Online', this)">Online</button>
      <button class="filter-btn" onclick="filtrar('Bariatría', this)">Bariatría</button>
    </div>

    <div id="lista"></div>
  </div>
</div>


<button id="btn-refresh" title="Actualizar citas" onclick="refrescarCitas()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="23 4 23 10 17 10"></polyline>
    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
  </svg>
</button>

<div id="toast">✓ Texto copiado</div>

<script>
// ── AUTH ──
const HASH_OK       = '81d528310678bb4f38ff7c985ee62b94e58826cb4eb451fb72f61166f6d3c4ba';
const SESSION_KEY   = 'eutimya_admin_tok';
const SESSION_DAYS  = 30;

// Al cargar: verificar si hay sesión válida guardada
(function checkSavedSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return;
    const { tok, exp, hash } = JSON.parse(raw);
    if (!tok || !exp || !hash) return;
    if (Date.now() > exp) { localStorage.removeItem(SESSION_KEY); return; }
    // El token guardado debe contener el hash (prueba de que lo generó alguien que sabía la contraseña)
    if (hash !== HASH_OK) { localStorage.removeItem(SESSION_KEY); return; }
    // Sesión válida → entrar sin pedir contraseña
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    cargarYRenderizar();
  } catch(e) { localStorage.removeItem(SESSION_KEY); }
})();

function saveSession() {
  const tok = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
  const exp = Date.now() + SESSION_DAYS * 24 * 60 * 60 * 1000;
  localStorage.setItem(SESSION_KEY, JSON.stringify({ tok, exp, hash: HASH_OK }));
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}
const API_URL = 'https://script.google.com/macros/s/AKfycbzhaHfMhmjcWp1WraHF5fjINcq7j493kjGyqHA3DK71Bm2NqWi5j1aU16QYd4UeG5yO-g/exec';

let CITAS = [];

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkLogin() {
  const val = document.getElementById('pwd-input').value;
  const h   = await sha256(val);
  if (h === HASH_OK) {
    if (document.getElementById('remember-me').checked) saveSession();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    cargarYRenderizar();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

function cerrarSesion() {
  clearSession();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkLogin(); });

// ── CARGA DINÁMICA DESDE APPS SCRIPT ──
async function cargarYRenderizar() {
  const lista = document.getElementById('lista');
  lista.innerHTML = '<div style="text-align:center;padding:48px 0;color:var(--muted);font-size:14px">Cargando citas en vivo…</div>';

  try {
    const resp = await fetch(API_URL + '?action=citas');
    const json = await resp.json();
    if (json.status !== 'ok') throw new Error(json.message || 'Error API');

    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const fin = new Date(hoy); fin.setDate(hoy.getDate() + 7);

    const DIAS_ES  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    const seen = new Set();
    const rows = [];

    json.rows.forEach(r => {
      const doctor    = (r['Doctor']           || '').trim();
      const nombre    = (r['Nombre']           || '').trim();
      const celularRaw= String(r['Celular']    || '').trim().replace(/\.0$/, '');
      const modalidad = (r['Modalidad']        || '').trim();
      const link      = (r['Link de Sesión'] || r['Link de Sesion'] || r['Link'] || r['Meet'] || r['link de sesión'] || r['link de sesion'] || '').trim();

      if (!['Presencial','Online','Bariatría'].includes(modalidad)) return;

      // parsear fecha — ahora llega como "yyyy-MM-dd" limpio desde Apps Script
      let fechaDate = null;
      const fRaw = r['Fecha de Cita'];
      if (fRaw) {
        const parts = String(fRaw).split('-');
        if (parts.length === 3) {
          fechaDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
        }
      }
      if (!fechaDate || fechaDate < hoy || fechaDate > fin) return;

      // parsear hora — ahora llega como "HH:mm" limpio desde Apps Script
      let horaInicio = '?', horaFin = '?';
      const hRaw = r['Hora de Cita'];
      if (hRaw) {
        const matchStr = String(hRaw).match(/^(\d{1,2}):(\d{2})/);
        if (matchStr) {
          const hh = parseInt(matchStr[1], 10);
          const mm = parseInt(matchStr[2], 10);
          horaInicio = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
          const finMin = hh * 60 + mm + 50;
          horaFin = String(Math.floor(finMin/60)).padStart(2,'0') + ':' + String(finMin%60).padStart(2,'0');
        }
      }

      // dedup por doctor+nombre+fecha+hora
      const key = `${doctor}|${nombre}|${fechaDate.toISOString().slice(0,10)}|${horaInicio}`;
      if (seen.has(key)) return;
      seen.add(key);

      const fechaISO = fechaDate.toISOString().slice(0,10);
      const dSem     = DIAS_ES[fechaDate.getDay()];
      const dNum     = fechaDate.getDate();
      const mes      = MESES_ES[fechaDate.getMonth()];
      const anio     = fechaDate.getFullYear();
      const fechaFmt = `${dSem}, ${dNum} de ${mes} ${anio}`;
      const cel      = celularRaw.replace(/\D/g,'').slice(-10);

      rows.push({ doctor, nombre, celular: cel, fecha: fechaISO, fecha_fmt: fechaFmt,
                  hora_inicio: horaInicio, hora_fin: horaFin, modalidad,
                  link: modalidad === 'Presencial' ? '' : link });
    });

    rows.sort((a,b) => a.fecha.localeCompare(b.fecha) || a.hora_inicio.localeCompare(b.hora_inicio));
    CITAS = rows;

    // actualizar subtítulo del header con rango real
    if (rows.length) {
      const f0 = rows[0].fecha_fmt;
      const fN = rows[rows.length-1].fecha_fmt;
      document.querySelector('.header-sub').textContent = `${f0} — ${fN}`;
    }

    renderCitas();

  } catch(err) {
    lista.innerHTML = `<div style="text-align:center;padding:48px 0;color:#c62828;font-size:14px">
      Error al cargar: ${err.message}<br>
      <button onclick="cargarYRenderizar()" style="margin-top:12px;padding:8px 20px;background:var(--teal);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit">
        Reintentar
      </button></div>`;
  }
}

// ── RECORDATORIOS ──
function generarTexto(c) {
  const mod = c.modalidad;
  const dia = c.fecha_fmt.charAt(0).toUpperCase() + c.fecha_fmt.slice(1);
  const horario = `${c.hora_inicio}–${c.hora_fin} (hora cdmx)`;

  if (mod === 'Presencial') {
    return `Hola! Te recordamos tu cita programada. Por favor, confírmanos tu asistencia por aquí. En caso de que no puedas asistir, te agradeceríamos avisarnos con anticipación para liberar el espacio y ofrecérselo a otro paciente que lo necesite. ¡Muchas gracias! \n\nPresencial (${c.nombre})\n${dia}⋅${horario}\nMoras 619, Col del Valle,  03104 CDMX.\n\nFormas de pago: eutimya.org/pagos`;
  } else {
    let linkLine = c.link ? `Google Meet: ${c.link}` : 'El link de tu sesión te será enviado en breve.';
    return `Hola! Te recordamos tu cita programada. Por favor, confírmanos tu asistencia por aquí. En caso de que no puedas asistir, te agradeceríamos avisarnos con anticipación para liberar el espacio y ofrecérselo a otro paciente que lo necesite. ¡Muchas gracias! \n\nOnline (${c.nombre})\n${dia}⋅${horario}\n${linkLine}\n\nFormas de pago: eutimya.org/pagos`;
  }
}

// ── RENDER ──
function renderCitas() {
  const total    = CITAS.length;
  const moya     = CITAS.filter(c => c.doctor === 'Dr. Moya' && c.modalidad !== 'Bariatría').length;
  const sharon   = CITAS.filter(c => c.doctor === 'Dra. Venecia' && c.modalidad !== 'Bariatría').length;
  const presencial = CITAS.filter(c => c.modalidad === 'Presencial').length;
  const online   = CITAS.filter(c => c.modalidad === 'Online').length;
  const baria    = CITAS.filter(c => c.modalidad === 'Bariatría').length;

  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-moya').textContent     = moya;
  document.getElementById('stat-sharon').textContent   = sharon;
  document.getElementById('stat-presencial').textContent = presencial;
  document.getElementById('stat-online').textContent   = online;
  document.getElementById('stat-bariatria').textContent = baria;
  document.getElementById('total-badge').textContent   = total + ' citas';

  const grupos = {};
  CITAS.forEach((c, i) => {
    c._idx = i;
    if (!grupos[c.fecha]) grupos[c.fecha] = [];
    grupos[c.fecha].push(c);
  });

  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  Object.keys(grupos).sort().forEach(fecha => {
    const citasDelDia = grupos[fecha];
    const g = document.createElement('div');
    g.className = 'day-group collapsed';
    g.dataset.fecha = fecha;

    const fechaLabel = citasDelDia[0].fecha_fmt;
    const labelCap   = fechaLabel.charAt(0).toUpperCase() + fechaLabel.slice(1);
    g.innerHTML = `
      <div class="day-header" onclick="toggleDay(this.parentElement)">
        <span class="day-chevron">▼</span>
        ${labelCap}
        <span class="day-count">${citasDelDia.length} citas</span>
      </div>
      <div class="day-cards"></div>`;

    const cardsWrap = g.querySelector('.day-cards');
    const copiados  = getCopiados();

    citasDelDia.forEach(c => {
      const card = document.createElement('div');
      card.className = 'cita-card';
      card.dataset.doctor    = c.doctor;
      card.dataset.modalidad = c.modalidad;

      const modClass = c.modalidad === 'Presencial' ? 'presencial' :
                       c.modalidad === 'Online' ? 'online' : 'bariatria';
      const docClass = c.doctor === 'Dr. Moya' ? 'moya' : 'sharon';

      const tieneCel = c.celular && c.celular.length >= 10;
      const cel10    = tieneCel ? c.celular.slice(-10) : '';
      const waUrl    = tieneCel ? `https://wa.me/521${cel10}` : '';

      card.innerHTML = `
        <div class="cita-hora">${c.hora_inicio}<span>${c.hora_fin}</span></div>
        <div class="divider"></div>
        <div class="cita-info">
          <div class="cita-nombre">${c.nombre}</div>
          <div class="cita-meta">
            <span class="badge badge-${modClass}"><span class="badge-dot"></span>${c.modalidad}</span>
            <span class="badge badge-${docClass}"><span class="badge-dot"></span>${c.doctor}</span>
            ${tieneCel ? `<span>${cel10}</span>` : '<span class="no-cel">Sin celular</span>'}
            ${c.modalidad !== 'Presencial'
              ? (c.link
                  ? `<span class="meet-link" title="${c.link}">🎥 ${c.link.replace(/^https?:\/\//,'')}</span>`
                  : `<span class="meet-link-missing">⚠ Sin link Meet</span>`)
              : ''}
          </div>
        </div>
        <div class="cita-actions">
          ${tieneCel ? `
          <button class="btn-copy" id="copy-${c._idx}" onclick="copiarTexto(${c._idx}, this)">Copiar</button>
          <a class="btn-wa" href="${waUrl}" target="_blank" onclick="prepararWA(${c._idx})">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2C6.477 2 2 6.477 2 12c0 1.899.512 3.677 1.406 5.207L2 22l4.905-1.386A9.96 9.96 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 11.999 2zm.001 18a8 8 0 0 1-4.073-1.117l-.292-.173-3.03.857.856-3.03-.189-.301A8 8 0 1 1 12 20z"/></svg>
            WA
          </a>` : `<span class="no-cel">Sin teléfono</span>`}
        </div>`;
      // Restaurar estado copiado
      if (copiados[copiadoKey(c)]) {
        const btn = card.querySelector(`#copy-${c._idx}`);
        if (btn) { btn.textContent = '✓ Copiado'; btn.classList.add('copied'); }
      }
      cardsWrap.appendChild(card);
    });

    lista.appendChild(g);
  });

  abrirPrimerDiaPendiente();
}


// ── DÍAS COLAPSABLES ──
function toggleDay(group) {
  group.classList.toggle('collapsed');
}

function abrirPrimerDiaPendiente() {
  const groups = [...document.querySelectorAll('.day-group')]
    .filter(g => !g.classList.contains('hidden'));

  let opened = false;
  for (const g of groups) {
    const btns = [...g.querySelectorAll('.btn-copy')]
      .filter(b => !b.closest('.cita-card').classList.contains('hidden'));
    if (btns.length === 0) continue;
    if (btns.some(b => !b.classList.contains('copied'))) {
      g.classList.remove('collapsed');
      opened = true;
      break;
    } else {
      g.classList.add('day-done');
    }
  }
  if (!opened && groups.length) groups[0].classList.remove('collapsed');
}

function advanceDayIfComplete(fecha) {
  const groups = [...document.querySelectorAll('.day-group')]
    .filter(g => !g.classList.contains('hidden'));

  let idx = -1;
  groups.forEach((g, i) => { if (g.dataset.fecha === fecha) idx = i; });
  if (idx === -1) return;

  const current = groups[idx];
  const btns = [...current.querySelectorAll('.btn-copy')]
    .filter(b => !b.closest('.cita-card').classList.contains('hidden'));

  if (!btns.length || !btns.every(b => b.classList.contains('copied'))) return;

  current.classList.add('day-done', 'collapsed');

  const next = groups.slice(idx + 1).find(g => {
    const bs = [...g.querySelectorAll('.btn-copy')]
      .filter(b => !b.closest('.cita-card').classList.contains('hidden'));
    return bs.some(b => !b.classList.contains('copied'));
  });

  if (next) {
    next.classList.remove('collapsed');
    setTimeout(() => next.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
    const label = (next.querySelector('.day-header')?.textContent || '')
      .replace('▼','').replace(/\d+\s*citas?/i,'').replace(/\s+/g,' ').trim();
    showToast('→ ' + (label || 'Siguiente día'));
  } else {
    showToast('✓ Todos los días completados');
  }
}

// ── COPIAR ──
async function copiarTexto(idx, btn) {
  if (btn.classList.contains('copied')) return; // ya copiado
  const c = CITAS[idx];
  const texto = generarTexto(c);
  try {
    await navigator.clipboard.writeText(texto);
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    showToast('Texto copiado');
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = texto;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    showToast('Texto copiado');
  }
}

async function prepararWA(idx) {
  const c = CITAS[idx];
  const texto = generarTexto(c);
  try {
    await navigator.clipboard.writeText(texto);
    showToast('Texto copiado — pégalo en WhatsApp');
  } catch(e) {}
}


// ── REFRESH FLOTANTE ──
async function refrescarCitas() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  btn.disabled = true;
  await cargarYRenderizar();
  btn.classList.remove('spinning');
  btn.disabled = false;
  showToast('Citas actualizadas');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── FILTROS ──
let filtroActual = 'todos';
function filtrar(valor, btn) {
  filtroActual = valor;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.cita-card').forEach(card => {
    if (valor === 'todos') {
      card.classList.remove('hidden');
    } else if (valor === 'Dr. Moya' || valor === 'Dra. Venecia') {
      card.dataset.doctor === valor ? card.classList.remove('hidden') : card.classList.add('hidden');
    } else {
      card.dataset.modalidad === valor ? card.classList.remove('hidden') : card.classList.add('hidden');
    }
  });

  document.querySelectorAll('.day-group').forEach(g => {
    const visible = [...g.querySelectorAll('.cita-card')].some(c => !c.classList.contains('hidden'));
    visible ? g.classList.remove('hidden') : g.classList.add('hidden');
  });

  document.querySelectorAll('.day-group:not(.hidden)').forEach(g => g.classList.add('collapsed'));
  abrirPrimerDiaPendiente();
}
