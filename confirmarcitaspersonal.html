<!DOCTYPE html>
<html lang="es" data-profile="moya">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación de Citas · Eutimya</title>
<link rel="apple-touch-icon" href="https://psiquiatra-cdmx.eutimya.org/favicon.png">
<link rel="icon" type="image/png" href="https://psiquiatra-cdmx.eutimya.org/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="eutimya-glass.css"/>
<link rel="stylesheet" href="glasskit.css"/>
<link rel="stylesheet" href="glasskit-eutimya.css"/>
<style>
  /* ── TEMA MOYA (default) ── */
  :root {
    --navy: #0D1B2A;
    --teal: #006A60;
    --teal-light: #E9F0EE;
    --gold: #C9A84C;
    --bg: #F7F8F6;
    --card: #ffffff;
    --text: #1A1A1A;
    --muted: #5A6472;
    --border: #E2E8E4;
    --presencial: #E8F5E9;
    --presencial-dot: #2E7D32;
    --online: #E3F2FD;
    --online-dot: #1565C0;
    --refresh-shadow: rgba(0,106,96,.35);
  }
  /* ── TEMA SHARON (pastel) ── */
  html[data-profile="sharon"] {
    --navy: #6B4858;
    --teal: #C97B92;
    --teal-light: #FCE7EE;
    --gold: #F2C994;
    --bg: #FBF6F8;
    --card: #ffffff;
    --text: #2A1F25;
    --muted: #7A6470;
    --border: #EDDDE3;
    --presencial: #F1E7F0;
    --presencial-dot: #7A5673;
    --online: #FDEBF1;
    --online-dot: #B86A85;
    --refresh-shadow: rgba(201,123,146,.40);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .25s; }

  /* ── LOGIN ── */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .login-card {
    background: var(--card); border-radius: 20px; padding: 36px 32px;
    max-width: 420px; width: 100%;
    box-shadow: 0 4px 40px rgba(0,0,0,.10);
    text-align: center;
  }
  .login-logo { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--navy); margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .profile-picker { display: flex; gap: 14px; margin-bottom: 22px; justify-content: center; }
  .profile-option {
    flex: 1; max-width: 160px; padding: 14px 10px;
    border: 2px solid var(--border); border-radius: 16px;
    background: var(--card); cursor: pointer;
    transition: all .18s; display: flex; flex-direction: column;
    align-items: center; gap: 10px;
  }
  .profile-option:hover { transform: translateY(-2px); }
  .profile-option.selected[data-profile="moya"]   { border-color: #b8893a; box-shadow: 0 4px 16px rgba(184,137,58,.22); }
  .profile-option.selected[data-profile="sharon"] { border-color: #C97B92; box-shadow: 0 4px 16px rgba(201,123,146,.25); }
  .profile-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    object-fit: cover; background: var(--border);
  }
  .profile-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .profile-role { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .login-label { display: block; text-align: left; font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
  .login-input {
    width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border .2s;
  }
  .login-input:focus { border-color: var(--teal); }
  .login-btn {
    margin-top: 18px; width: 100%; padding: 14px;
    background: var(--navy); color: #fff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: background .2s;
  }
  .login-btn:hover { background: var(--teal); }
  .login-error { display: none; color: #c62828; font-size: 13px; margin-top: 12px; }

  .remember-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted); cursor: pointer;
    margin: 12px 0 4px; text-align: left;
  }
  .remember-label input[type="checkbox"] {
    width: 15px; height: 15px; accent-color: var(--teal);
    cursor: pointer; flex-shrink: 0;
  }

  /* ── APP ── */
  #app { display: none; }
  header {
    background: var(--navy); color: #fff; padding: 12px 18px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; gap: 10px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .header-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,.25); flex-shrink: 0; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 17px; line-height: 1.15; }
  .header-sub { font-size: 11px; opacity: .7; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .header-badge {
    background: var(--gold); color: var(--navy); padding: 5px 12px;
    border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .sync-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; padding: 4px 8px; border-radius: 10px;
    background: rgba(255,255,255,.14); color: #fff; opacity: .9;
    font-weight: 500;
  }
  .sync-badge.offline { background: rgba(255,170,0,.30); }
  .btn-logout {
    background: rgba(255,255,255,.12); color: #fff; border: none;
    padding: 7px 11px; border-radius: 8px; font-size: 12px;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: background .15s;
  }
  .btn-logout:hover { background: rgba(255,255,255,.22); }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  /* filtros */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .filter-btn {
    padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--border); background: var(--card); cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all .15s;
  }
  .filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .filter-btn:hover:not(.active) { border-color: var(--teal); color: var(--teal); }

  /* días */
  .day-group { margin-bottom: 16px; }
  .day-header {
    font-family: 'Playfair Display', serif; font-size: 17px; color: var(--navy);
    border-bottom: 2px solid var(--border); padding-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none; padding: 10px 4px;
    border-radius: 8px; transition: background .15s;
  }
  .day-header:hover { background: rgba(0,0,0,.04); }
  .day-chevron { font-size: 12px; color: var(--muted); transition: transform .22s ease; display: inline-block; margin-right: 2px; }
  .day-group.collapsed .day-chevron { transform: rotate(-90deg); }
  .day-cards { padding-top: 10px; margin-bottom: 8px; }
  .day-group.collapsed .day-cards { display: none; }
  .day-done .day-header { border-bottom-color: #4CAF50; }
  .day-done .day-chevron { color: #4CAF50; }
  .day-count { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: var(--muted); margin-left: auto; }

  /* cards */
  .cita-card {
    background: var(--card); border-radius: 14px; padding: 16px 18px;
    margin-bottom: 10px; border: 1.5px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    transition: box-shadow .15s, background .15s, border-color .15s;
  }
  .cita-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .cita-card.confirmada { background: #F1F8F2; border-color: #A5D6A7; }
  .cita-card.confirmada .cita-nombre::before { content: "✓ "; color: #2E7D32; font-weight: 800; }

  .cita-hora {
    font-size: 15px; font-weight: 600; color: var(--navy);
    min-width: 52px; text-align: center; line-height: 1.2;
  }
  .cita-hora span { display: block; font-size: 11px; font-weight: 400; color: var(--muted); }
  .divider { width: 1px; height: 40px; background: var(--border); }
  .cita-info { flex: 1; min-width: 0; }
  .cita-nombre {
    font-size: 15px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-drive { display: inline-flex; align-items: center; flex-shrink: 0; opacity: .55; transition: opacity .15s; }
  .btn-drive:hover { opacity: 1; }
  .btn-copy-nombre {
    background: none; border: none; padding: 2px 3px;
    cursor: pointer; color: var(--muted); flex-shrink: 0;
    display: inline-flex; align-items: center;
    border-radius: 4px; transition: all .15s; opacity: .55;
  }
  .btn-copy-nombre:hover { background: var(--teal-light); color: var(--teal); opacity: 1; }
  .btn-copy-nombre.copied { color: #388e3c; opacity: 1; }
  .cita-meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge-presencial { background: var(--presencial); color: var(--presencial-dot); }
  .badge-presencial .badge-dot { background: var(--presencial-dot); }
  .badge-online { background: var(--online); color: var(--online-dot); }
  .badge-online .badge-dot { background: var(--online-dot); }

  .cita-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
  .btn-wa {
    background: #25D366; color: #fff; border: none;
    padding: 10px 14px; border-radius: 10px; font-size: 13px;
    font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    text-decoration: none; transition: background .15s;
  }
  .btn-wa:hover { background: #1ebe5d; }
  .btn-copy {
    background: var(--teal-light); color: var(--teal); border: 1.5px solid var(--teal);
    padding: 10px 14px; border-radius: 10px; font-size: 13px;
    font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all .15s;
  }
  .btn-copy:hover { background: var(--teal); color: #fff; }
  .btn-copy.copied {
    background: #9E9E9E; color: #fff; border-color: #bbb;
    opacity: 0.72; cursor: default;
  }
  .btn-confirm {
    background: #fff; color: #2E7D32; border: 1.5px solid #A5D6A7;
    padding: 10px 12px; border-radius: 10px;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-confirm:hover { background: #E8F5E9; }
  .btn-confirm.active { background: #2E7D32; border-color: #2E7D32; color: #fff; }

  /* registros / escalas */
  .cita-registros { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
  .reg-btn {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; text-decoration: none;
    padding: 3px 9px; border-radius: 8px;
    border: 1.5px solid; cursor: pointer; line-height: 1.45;
    font-family: 'DM Sans', sans-serif; transition: all .15s;
  }
  .reg-exp  { background: var(--teal); color: #fff; border-color: var(--teal); }
  .reg-exp:hover  { background: var(--navy); border-color: var(--navy); }
  .reg-asrs { background: var(--card); color: #5E35B1; border-color: #D1C4E9; }
  .reg-asrs:hover { background: #EDE7F6; }
  .reg-diva { background: var(--card); color: #00838F; border-color: #B2EBF2; }
  .reg-diva:hover { background: #E0F7FA; }
  .reg-es   { background: var(--card); color: #1565C0; border-color: #BBDEFB; }
  .reg-es:hover   { background: #E3F2FD; }
  .reg-eb   { background: var(--card); color: #2E7D32; border-color: #C8E6C9; }
  .reg-eb:hover   { background: #E8F5E9; }

  /* sin cel */
  .no-cel { opacity: .4; font-size: 11px; color: var(--muted); }

  /* pago confirmado */
  .badge-pago {
    display: inline-flex; align-items: center; justify-content: center;
    width: 17px; height: 17px; border-radius: 50%;
    background: #E8F5E9; color: #2E7D32; font-size: 10px; font-weight: 800;
    border: 1.5px solid #A5D6A7; flex-shrink: 0; line-height: 1; cursor: default;
  }

  /* meet link */
  .meet-wrap { display: inline-flex; align-items: center; gap: 4px; }
  .meet-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--online-dot); background: var(--online);
    padding: 2px 7px; border-radius: 8px; max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-weight: 500; text-decoration: none;
  }
  .meet-link:hover { text-decoration: underline; }
  .btn-copy-link {
    background: var(--online); border: 1px solid var(--online-dot);
    color: var(--online-dot); border-radius: 6px;
    padding: 3px 5px; cursor: pointer; display: inline-flex;
    align-items: center; transition: all .15s; flex-shrink: 0;
  }
  .btn-copy-link:hover { background: var(--online-dot); color: #fff; }
  .btn-copy-link.copied { background: #c8e6c9; border-color: #388e3c; color: #388e3c; }
  .meet-link-missing {
    font-size: 11px; color: #c62828; background: #FFEBEE;
    padding: 2px 7px; border-radius: 8px; font-weight: 500;
  }

  /* toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--navy); color: #fff; padding: 12px 24px; border-radius: 30px;
    font-size: 14px; font-weight: 500; z-index: 999;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* refresh flotante */
  #btn-refresh {
    position: fixed; bottom: 24px; right: 20px; z-index: 998;
    background: var(--teal); color: #fff; border: none;
    width: 52px; height: 52px; border-radius: 50%;
    cursor: pointer; box-shadow: 0 4px 16px var(--refresh-shadow);
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .2s;
  }
  #btn-refresh:hover { background: var(--navy); transform: scale(1.08); }
  #btn-refresh.spinning svg { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* stats */
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat {
    background: var(--card); border-radius: 12px; padding: 12px 18px;
    border: 1.5px solid var(--border); font-size: 13px; color: var(--muted);
  }
  .stat strong { display: block; font-size: 22px; font-weight: 600; color: var(--navy); }

  .cita-card.hidden, .day-group.hidden { display: none; }

  @media (max-width: 600px) {
    .cita-card { flex-wrap: wrap; }
    .cita-actions { width: 100%; justify-content: flex-end; }
    .login-card { padding: 30px 22px; }
    .header-sub { display: none; }
    .header-title { font-size: 15px; }
    .btn-logout span { display: none; }
  }

/* ===== Eutimya iOS Liquid Glass adapter ===== */

:root{
  --navy:#0d1b2a;--teal:#b8893a;--teal-light:#F4EDE0;--gold:#b8893a;
  --bg:#F5F5F7;--card:#fff;--text:#0d1b2a;--muted:#5a7a9e;--border:rgba(13,27,42,.10);
}

.login-card,.cita-card{background:var(--ilg-glass)!important;backdrop-filter:var(--ilg-blur);-webkit-backdrop-filter:var(--ilg-blur);border:var(--ilg-glass-border)!important;box-shadow:var(--ilg-shadow-2),var(--ilg-specular)!important;}
.login-btn,.reg-btn,.filter-btn{transition:transform var(--ilg-dur-spring) var(--ilg-ease-spring),background .2s!important;}
.login-btn:active,.reg-btn:active,.filter-btn:active{transform:scale(1.045);}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Eutimya</div>
    <div class="login-sub">Panel de confirmación de citas</div>

    <div class="profile-picker">
      <div class="profile-option selected" data-profile="moya" onclick="selectProfile('moya')">
        <img class="profile-avatar" src="https://psiquiatra-cdmx.eutimya.org/perfilmoya.jpg" alt="Dr. Moya">
        <div>
          <div class="profile-name">Dr. Moya</div>
          <div class="profile-role">Psiquiatría</div>
        </div>
      </div>
      <div class="profile-option" data-profile="sharon" onclick="selectProfile('sharon')">
        <img class="profile-avatar" src="https://paido.eutimya.org/perfilsharon.jpg" alt="Dra. Venecia">
        <div>
          <div class="profile-name">Dra. Venecia</div>
          <div class="profile-role">Paidopsiquiatría</div>
        </div>
      </div>
    </div>

    <label class="login-label">Contraseña</label>
    <input id="pwd-input" class="login-input" type="password" placeholder="••••••••••••" autocomplete="current-password">
    <label class="remember-label">
      <input type="checkbox" id="remember-me">
      <span>Recordar en este dispositivo (30 días)</span>
    </label>
    <button class="login-btn" onclick="checkLogin()">Entrar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header>
    <div class="header-left">
      <img id="header-avatar" class="header-avatar" src="" alt="">
      <div>
        <div class="header-title" id="header-doctor">—</div>
        <div class="header-sub" id="header-sub">Cargando…</div>
      </div>
    </div>
    <div class="header-right">
      <span class="header-badge" id="total-badge">— citas</span>
      <span class="sync-badge" id="sync-badge" title="Estado de sincronización">☁</span>
      <button class="btn-logout" onclick="cerrarSesion()" title="Cerrar sesión">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Salir</span>
      </button>
    </div>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat"><strong id="stat-total">—</strong>Total semana</div>
      <div class="stat"><strong id="stat-presencial">—</strong>Presencial</div>
      <div class="stat"><strong id="stat-online">—</strong>Online</div>
      <div class="stat"><strong id="stat-confirmadas">—</strong>Confirmadas</div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
      <button class="filter-btn" onclick="filtrar('Presencial', this)">Presencial</button>
      <button class="filter-btn" onclick="filtrar('Online', this)">Online</button>
      <button class="filter-btn" onclick="filtrar('pendientes', this)">Pendientes</button>
    </div>

    <div id="lista"></div>
  </div>
</div>

<button id="btn-refresh" title="Actualizar citas" onclick="refrescarCitas()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
</button>

<div id="toast">✓ Texto copiado</div>

<script>
// ── CONFIG ──
const HASH_OK       = '81d528310678bb4f38ff7c985ee62b94e58826cb4eb451fb72f61166f6d3c4ba';
const SESSION_KEY   = 'eutimya_admin_tok';
const FILTER_KEY    = 'eutimya_filtro';
const COPIED_KEY    = 'eutimya_copiados';
const CONFIRMED_KEY = 'eutimya_confirmados';
const SESSION_DAYS  = 30;
const API_URL       = 'https://script.google.com/macros/s/AKfycbzhaHfMhmjcWp1WraHF5fjINcq7j493kjGyqHA3DK71Bm2NqWi5j1aU16QYd4UeG5yO-g/exec';

const PROFILES = {
  moya:   { doctor: 'Dr. Moya',     nombre: 'Dr. Moya',     foto: 'https://psiquiatra-cdmx.eutimya.org/perfilmoya.jpg' },
  sharon: { doctor: 'Dra. Venecia', nombre: 'Dra. Venecia', foto: 'https://paido.eutimya.org/perfilsharon.jpg' }
};

const PAGOS_URL = {
  'Dr. Moya':     'eutimya.org/pagos',
  'Dra. Venecia': 'paido.eutimya.org/cita#pagos'
};

let PROFILE_ACTIVE = 'moya';
let CITAS = [];
let filtroActual = 'todos';
let REGISTROS = null;
let lastKnownCitaKeys = null;
let pollingTimer = null;
let PAGOS_DATA = [];

// Fuentes de registros (expediente + escalas). El orden = orden de los botones.
const REGISTROS_FUENTES = [
  { key: 'expediente', label: 'Expediente' },
  { key: 'asrs',       label: 'ASRS' },
  { key: 'diva',       label: 'DIVA' },
  { key: 'es',         label: 'ES' },
  { key: 'eb',         label: 'EB' }
];
// Umbrales de similitud de nombre (0–1). Conservadores para evitar homónimos.
const SIM_STRONG = 0.84;  // coincidencia fuerte: basta el nombre
const SIM_MIN    = 0.66;  // coincidencia dudosa: además exige fecha de nacimiento

// ── PROFILE ──
function selectProfile(p) {
  if (!PROFILES[p]) return;
  PROFILE_ACTIVE = p;
  document.querySelectorAll('.profile-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.profile === p);
  });
  document.documentElement.dataset.profile = p;
}

function applyProfileUI() {
  document.documentElement.dataset.profile = PROFILE_ACTIVE;
  const cfg = PROFILES[PROFILE_ACTIVE];
  document.getElementById('header-doctor').textContent = cfg.nombre;
  document.getElementById('header-avatar').src = cfg.foto;
  document.getElementById('header-avatar').alt = cfg.nombre;
}

// ── NOTIFICACIONES ──
async function pedirPermisoNotificaciones() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const perm = await Notification.requestPermission();
  return perm === 'granted';
}

function abrirDia(fecha) {
  const grupo = [...document.querySelectorAll('.day-group')].find(g => g.dataset.fecha === fecha);
  if (!grupo) return;
  grupo.classList.remove('collapsed', 'hidden');
  setTimeout(() => grupo.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function mostrarNotifNuevaCita(c) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const diaFmt = c.fecha_fmt.charAt(0).toUpperCase() + c.fecha_fmt.slice(1);
  const notif = new Notification('🗓 Nueva cita agendada', {
    body: `${c.nombre}\n${diaFmt} · ${c.hora_inicio}`,
    icon: 'https://psiquiatra-cdmx.eutimya.org/favicon.png',
    tag: `${c.doctor}|${c.nombre}|${c.fecha}|${c.hora_inicio}`,
    requireInteraction: false
  });
  notif.onclick = () => { notif.close(); window.focus(); abrirDia(c.fecha); };
}

function iniciarPolling() {
  if (pollingTimer) clearInterval(pollingTimer);
  pollingTimer = setInterval(pollSilencioso, 5 * 60 * 1000);
}

async function pollSilencioso() {
  if (document.getElementById('app').style.display === 'none') return;
  try {
    const resp = await fetch(API_URL + '?action=citas');
    const json = await resp.json();
    if (json.status !== 'ok' || !json.rows) return;

    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const fin = new Date(hoy); fin.setDate(hoy.getDate() + 7);
    const docFiltro = PROFILES[PROFILE_ACTIVE].doctor;
    const DIAS_ES  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const seen = new Set();
    const novedades = [];

    json.rows.forEach(r => {
      const doctor    = (r['Doctor']    || '').trim();
      const nombre    = (r['Nombre']    || '').trim();
      const modalidad = (r['Modalidad'] || '').trim();
      if (!['Presencial','Online'].includes(modalidad) || doctor !== docFiltro) return;

      let fechaDate = null;
      const fRaw = r['Fecha de Cita'];
      if (fRaw) {
        const parts = String(fRaw).split('-');
        if (parts.length === 3) fechaDate = new Date(+parts[0], +parts[1]-1, +parts[2]);
      }
      if (!fechaDate || fechaDate < hoy || fechaDate > fin) return;

      let horaInicio = '?';
      const hRaw = r['Hora de Cita'];
      if (hRaw) {
        const m = String(hRaw).match(/^(\d{1,2}):(\d{2})/);
        if (m) horaInicio = String(+m[1]).padStart(2,'0') + ':' + m[2];
      }

      const fechaISO = fechaDate.toISOString().slice(0,10);
      const k = `${doctor}|${nombre}|${fechaISO}|${horaInicio}`;
      if (seen.has(k)) return;
      seen.add(k);

      if (lastKnownCitaKeys && !lastKnownCitaKeys.has(k)) {
        novedades.push({
          doctor, nombre, fecha: fechaISO, hora_inicio: horaInicio,
          fecha_fmt: `${DIAS_ES[fechaDate.getDay()]}, ${fechaDate.getDate()} de ${MESES_ES[fechaDate.getMonth()]} ${fechaDate.getFullYear()}`
        });
      }
    });

    lastKnownCitaKeys = seen;
    novedades.forEach(c => mostrarNotifNuevaCita(c));
    if (novedades.length > 0) setTimeout(cargarYRenderizar, 600);
  } catch(e) {}
}

// ── AUTH ──
(function checkSavedSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return;
    const { tok, exp, hash, profile } = JSON.parse(raw);
    if (!tok || !exp || !hash) return;
    if (Date.now() > exp) { localStorage.removeItem(SESSION_KEY); return; }
    if (hash !== HASH_OK)  { localStorage.removeItem(SESSION_KEY); return; }
    if (profile && PROFILES[profile]) selectProfile(profile);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    applyProfileUI();
    pedirPermisoNotificaciones();
    iniciarPolling();
    cargarYRenderizar();
  } catch(e) { localStorage.removeItem(SESSION_KEY); }
})();

function saveSession() {
  const tok = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
  const exp = Date.now() + SESSION_DAYS * 24 * 60 * 60 * 1000;
  localStorage.setItem(SESSION_KEY, JSON.stringify({ tok, exp, hash: HASH_OK, profile: PROFILE_ACTIVE }));
}

function clearSession() { localStorage.removeItem(SESSION_KEY); }

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkLogin() {
  const val = document.getElementById('pwd-input').value;
  const h   = await sha256(val);
  if (h === HASH_OK) {
    if (document.getElementById('remember-me').checked) saveSession();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    applyProfileUI();
    pedirPermisoNotificaciones();
    iniciarPolling();
    cargarYRenderizar();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

function cerrarSesion() {
  clearSession();
  if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}

document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkLogin(); });

// ── ESTADOS (copiados + confirmadas) — sync local ↔ nube ──
function citaKey(c) {
  return `${c.doctor}|${c.nombre}|${c.fecha}|${c.hora_inicio}`;
}

function getLocalMap(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return {};
    const data = JSON.parse(raw);
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    let limpiado = false;
    Object.keys(data).forEach(k => {
      const fecha = k.split('|')[2];
      if (fecha && new Date(fecha) < hoy) { delete data[k]; limpiado = true; }
    });
    if (limpiado) localStorage.setItem(key, JSON.stringify(data));
    return data;
  } catch(e) { return {}; }
}

function setLocalMap(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

function setSyncStatus(state) {
  const b = document.getElementById('sync-badge');
  if (!b) return;
  if      (state === 'syncing') { b.textContent = '⟳ sync';   b.classList.remove('offline'); }
  else if (state === 'ok')      { b.textContent = '☁ sync';   b.classList.remove('offline'); }
  else                          { b.textContent = '☁ local';  b.classList.add('offline'); }
}

async function fetchEstadosRemoto() {
  setSyncStatus('syncing');
  try {
    const resp = await fetch(API_URL + '?action=estados', { method: 'GET' });
    const json = await resp.json();
    if (json.status !== 'ok') throw new Error(json.message || 'no-ok');
    const remCop = json.copiados    || {};
    const remCon = json.confirmados || {};
    // Merge: la nube manda; lo local que la nube no tiene se preserva.
    const locCop = getLocalMap(COPIED_KEY);
    const locCon = getLocalMap(CONFIRMED_KEY);
    const merCop = { ...locCop, ...remCop };
    const merCon = { ...locCon, ...remCon };
    setLocalMap(COPIED_KEY, merCop);
    setLocalMap(CONFIRMED_KEY, merCon);
    setSyncStatus('ok');
    return true;
  } catch(e) {
    setSyncStatus('offline');
    return false;
  }
}

async function marcarRemoto(tipo, key, valor) {
  try {
    const url = `${API_URL}?action=marcar&tipo=${encodeURIComponent(tipo)}&key=${encodeURIComponent(key)}&valor=${valor ? '1' : '0'}`;
    await fetch(url, { method: 'GET' });
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('offline'); }
}

function marcarCopiado(c) {
  const data = getLocalMap(COPIED_KEY);
  const k = citaKey(c);
  data[k] = true;
  setLocalMap(COPIED_KEY, data);
  marcarRemoto('copiado', k, true);
}

function toggleConfirmada(c) {
  const data = getLocalMap(CONFIRMED_KEY);
  const k = citaKey(c);
  const nuevo = !data[k];
  if (nuevo) data[k] = true; else delete data[k];
  setLocalMap(CONFIRMED_KEY, data);
  marcarRemoto('confirmado', k, nuevo);
  return nuevo;
}

// ── REGISTROS (expediente + escalas) ──
// El navegador no puede leer hojas privadas: el endpoint ?action=registros
// (Apps Script) devuelve un índice y aquí emparejamos cada cita.
async function fetchRegistros() {
  try {
    const resp = await fetch(API_URL + '?action=registros');
    const json = await resp.json();
    if (json.status !== 'ok' || !json.fuentes) throw new Error('no-ok');
    REGISTROS = json.fuentes;
    return true;
  } catch(e) {
    REGISTROS = null;
    return false;
  }
}

// Normaliza nombres: sin acentos, MAYÚSCULAS, sin puntuación, 1 espacio.
function normNombre(s) {
  return String(s == null ? '' : s)
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .toUpperCase().replace(/[^A-Z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
}

// Normaliza fecha de nacimiento de la cita a 'aaaa-mm-dd' (o 'aaaa').
function normFnacCita(v) {
  if (v == null) return '';
  const s = String(v).trim();
  if (!s) return '';
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);                       // ISO / aaaa-mm-dd
  if (m) return m[1] + '-' + m[2] + '-' + m[3];
  m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);         // dd/mm/aaaa
  if (m) {
    let d = +m[1], mo = +m[2], y = +m[3];
    if (y < 100) y += (y > 30 ? 1900 : 2000);
    return y + '-' + String(mo).padStart(2,'0') + '-' + String(d).padStart(2,'0');
  }
  if (/^(19|20)\d{2}$/.test(s)) return s;                            // solo año
  return '';
}

function bigramas(s) {
  s = s.replace(/\s/g, '');
  const b = {};
  for (let i = 0; i < s.length - 1; i++) {
    const g = s.substr(i, 2);
    b[g] = (b[g] || 0) + 1;
  }
  return b;
}

// Coeficiente de Dice sobre bigramas (0–1): tolera errores ortográficos.
function diceCoef(a, b) {
  if (a === b) return a ? 1 : 0;
  if (a.length < 2 || b.length < 2) return 0;
  const ba = bigramas(a), bb = bigramas(b);
  let inter = 0, total = 0;
  for (const g in ba) { total += ba[g]; if (bb[g]) inter += Math.min(ba[g], bb[g]); }
  for (const g in bb) { total += bb[g]; }
  return total ? 2 * inter / total : 0;
}

function tokensNombre(s) {
  return normNombre(s).split(' ').filter(t => t.length > 1);
}

// Similitud máxima: directa y con tokens ordenados (tolera reordenar apellidos).
function nombreSimilitud(a, b) {
  const na = normNombre(a), nb = normNombre(b);
  if (!na || !nb) return 0;
  const ord = x => x.split(' ').sort().join(' ');
  return Math.max(diceCoef(na, nb), diceCoef(ord(na), ord(nb)));
}

// Cobertura de tokens: cuántas palabras del nombre más corto están en el otro.
function tokenCobertura(a, b) {
  const ta = tokensNombre(a), tb = tokensNombre(b);
  if (!ta.length || !tb.length) return { cov: 0, n: 0 };
  const corto = ta.length <= tb.length ? ta : tb;
  const largo = ta.length <= tb.length ? tb : ta;
  let hit = 0;
  corto.forEach(t => {
    if (largo.some(u => u === t || diceCoef(t, u) >= 0.82)) hit++;
  });
  return { cov: hit / corto.length, n: corto.length };
}

// true = coincide, false = contradice, null = no se puede comparar.
function fnacCoincide(a, b) {
  if (!a || !b) return null;
  if (a === b) return true;
  if (a.length === 4 || b.length === 4) return a.slice(0,4) === b.slice(0,4);
  return false;
}

// items: [nombreNorm, fnac, email, fila] → devuelve la fila coincidente o 0.
function matchFuente(cita, items) {
  if (!items || !items.length) return 0;
  const emailC = (cita.email || '').toLowerCase().trim();
  const dobC   = cita.fnacKey || '';
  let emailFila = 0, nameFila = 0, nameScore = 0;

  for (const it of items) {
    const nom = it[0], fnac = it[1], email = it[2], fila = it[3];

    // 1) Correo idéntico → identificador fuerte.
    if (emailC && email && emailC === email) { emailFila = fila; continue; }

    // 2) Nombre difuso (+ fecha de nacimiento como respaldo).
    const sim = nombreSimilitud(cita.nombre, nom);
    const { cov, n } = tokenCobertura(cita.nombre, nom);
    if (sim < SIM_MIN && !(cov >= 0.66 && n >= 3)) continue;

    const fuerte = sim >= SIM_STRONG || (cov === 1 && n >= 3);
    const dob    = fnacCoincide(dobC, fnac);
    let ok;
    if (fuerte) ok = !(dobC && fnac && dob === false); // fuerte: acepta salvo que la fecha contradiga
    else        ok = (dob === true);                   // dudoso: solo si la fecha confirma
    const score = Math.max(sim, cov);
    if (ok && score >= nameScore) { nameScore = score; nameFila = fila; }
  }
  return emailFila || nameFila || 0;
}

// Devuelve { key: url } por cada fuente donde se encontró al paciente.
function matchRegistros(cita) {
  const res = {};
  if (!REGISTROS) return res;
  REGISTROS_FUENTES.forEach(f => {
    const src = REGISTROS[f.key];
    if (!src || !src.items) return;
    const fila = matchFuente(cita, src.items);
    if (fila) {
      res[f.key] = `https://docs.google.com/spreadsheets/d/${src.id}/edit#gid=${src.gid}&range=A${fila}`;
    }
  });
  return res;
}

const SVG_EXPEDIENTE = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>';

function chipRegistro(key, label, url) {
  if (key === 'expediente') {
    return `<a class="reg-btn reg-exp" href="${url}" target="_blank" rel="noopener" title="Abrir expediente de primera vez">${SVG_EXPEDIENTE}Expediente</a>`;
  }
  return `<a class="reg-btn reg-${key}" href="${url}" target="_blank" rel="noopener" title="Abrir ${label} de este paciente">${label}</a>`;
}

// Inserta/actualiza los botones de registros en cada tarjeta ya pintada.
function pintarRegistros() {
  if (!REGISTROS) return;
  document.querySelectorAll('.cita-card').forEach(card => {
    const idx = +card.dataset.idx;
    const c = CITAS[idx];
    if (!c) return;
    const reg = matchRegistros(c);
    const chips = REGISTROS_FUENTES
      .filter(f => reg[f.key])
      .map(f => chipRegistro(f.key, f.label, reg[f.key]))
      .join('');
    let cont = card.querySelector('.cita-registros');
    if (!chips) { if (cont) cont.remove(); return; }
    if (!cont) {
      cont = document.createElement('div');
      cont.className = 'cita-registros';
      card.querySelector('.cita-info').appendChild(cont);
    }
    cont.innerHTML = chips;
  });
}

// ── PAGOS (cruce con pestaña Pagos del Sheet) ──
async function fetchPagos() {
  try {
    const resp = await fetch(API_URL + '?action=pagos');
    const json = await resp.json();
    PAGOS_DATA = (json.status === 'ok' && json.pagos) ? json.pagos : [];
  } catch(e) { PAGOS_DATA = []; }
}

function citaTienePago(nombre, email) {
  if (!PAGOS_DATA.length) return false;
  const emailC = (email || '').toLowerCase().trim();
  const limite = new Date(); limite.setDate(limite.getDate() - 60);
  const limitStr = limite.toISOString().slice(0, 10);
  return PAGOS_DATA.some(p => {
    if (p.fechaPago && p.fechaPago < limitStr) return false;
    if (emailC && p.email && emailC === p.email) return true;
    return nombreSimilitud(nombre, p.nombre) >= 0.78;
  });
}

// ── CARGA DE CITAS ──
async function cargarYRenderizar() {
  const lista = document.getElementById('lista');
  lista.innerHTML = '<div style="text-align:center;padding:48px 0;color:var(--muted);font-size:14px">Cargando citas en vivo…</div>';

  // estados + registros + pagos en paralelo (no bloquear la carga)
  const estadosPromise   = fetchEstadosRemoto();
  const registrosPromise = fetchRegistros();
  const pagosPromise     = fetchPagos();
  registrosPromise.then(() => pintarRegistros()); // pinta los botones al llegar

  try {
    const resp = await fetch(API_URL + '?action=citas');
    const json = await resp.json();
    if (json.status !== 'ok') throw new Error(json.message || 'Error API');

    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const fin = new Date(hoy); fin.setDate(hoy.getDate() + 7);

    const DIAS_ES  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    const docFiltro = PROFILES[PROFILE_ACTIVE].doctor;
    const seen = new Set();
    const rows = [];

    await pagosPromise; // esperar pagos antes de cruzar datos
    json.rows.forEach(r => {
      const doctor    = (r['Doctor']           || '').trim();
      const nombre    = (r['Nombre']           || '').trim();
      const celularRaw= String(r['Celular']    || '').trim().replace(/\.0$/, '');
      const modalidad = (r['Modalidad']        || '').trim();
      const link      = (r['Link de Sesión'] || r['Link de Sesion'] || r['Link'] || r['Meet'] || r['link de sesión'] || r['link de sesion'] || '').trim();
      const emailP    = String(r['Email Paciente'] || r['Email'] || r['Correo'] || '').trim().toLowerCase();
      const fnacRaw   = r['Fecha de Nacimiento'] || r['Fecha de nacimiento'] || r['Fecha de Nac'] || '';
      const pagado    = citaTienePago(nombre, emailP);

      if (!['Presencial','Online'].includes(modalidad)) return;
      if (doctor !== docFiltro) return;

      let fechaDate = null;
      const fRaw = r['Fecha de Cita'];
      if (fRaw) {
        const parts = String(fRaw).split('-');
        if (parts.length === 3) fechaDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
      }
      if (!fechaDate || fechaDate < hoy || fechaDate > fin) return;

      let horaInicio = '?', horaFin = '?';
      const hRaw = r['Hora de Cita'];
      if (hRaw) {
        const m = String(hRaw).match(/^(\d{1,2}):(\d{2})/);
        if (m) {
          const hh = parseInt(m[1], 10);
          const mm = parseInt(m[2], 10);
          horaInicio = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
          const finMin = hh * 60 + mm + 50;
          horaFin = String(Math.floor(finMin/60)).padStart(2,'0') + ':' + String(finMin%60).padStart(2,'0');
        }
      }

      const key = `${doctor}|${nombre}|${fechaDate.toISOString().slice(0,10)}|${horaInicio}`;
      if (seen.has(key)) return;
      seen.add(key);

      const fechaISO = fechaDate.toISOString().slice(0,10);
      const dSem     = DIAS_ES[fechaDate.getDay()];
      const dNum     = fechaDate.getDate();
      const mes      = MESES_ES[fechaDate.getMonth()];
      const anio     = fechaDate.getFullYear();
      const fechaFmt = `${dSem}, ${dNum} de ${mes} ${anio}`;
      const cel      = celularRaw.replace(/\D/g,'').slice(-10);

      rows.push({
        doctor, nombre, celular: cel,
        fecha: fechaISO, fecha_fmt: fechaFmt,
        hora_inicio: horaInicio, hora_fin: horaFin,
        modalidad, link: modalidad === 'Presencial' ? '' : link,
        email: emailP, fnacKey: normFnacCita(fnacRaw), pagado
      });
    });

    rows.sort((a,b) => a.fecha.localeCompare(b.fecha) || a.hora_inicio.localeCompare(b.hora_inicio));
    CITAS = rows;
    lastKnownCitaKeys = new Set(rows.map(c => citaKey(c)));

    if (rows.length) {
      const f0 = rows[0].fecha_fmt;
      const fN = rows[rows.length-1].fecha_fmt;
      document.getElementById('header-sub').textContent = `${f0} — ${fN}`;
    } else {
      document.getElementById('header-sub').textContent = 'Sin citas en los próximos 7 días';
    }

    // esperar a estados antes de renderizar (mejor consistencia visual)
    await estadosPromise;
    renderCitas();

  } catch(err) {
    lista.innerHTML = `<div style="text-align:center;padding:48px 0;color:#c62828;font-size:14px">
      Error al cargar: ${err.message}<br>
      <button onclick="cargarYRenderizar()" style="margin-top:12px;padding:8px 20px;background:var(--teal);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit">
        Reintentar
      </button></div>`;
  }
}

// ── RECORDATORIO ──
function generarTexto(c) {
  const mod = c.modalidad;
  const dia = c.fecha_fmt.charAt(0).toUpperCase() + c.fecha_fmt.slice(1);
  const horario = `${c.hora_inicio}–${c.hora_fin} (hora cdmx)`;
  const urlPagos = PAGOS_URL[c.doctor] || PAGOS_URL['Dr. Moya'];

  if (mod === 'Presencial') {
    return `Hola! Te recordamos tu cita programada. Por favor, confírmanos tu asistencia por aquí. En caso de que no puedas asistir, te agradeceríamos avisarnos con anticipación para liberar el espacio y ofrecérselo a otro paciente que lo necesite. ¡Muchas gracias! \n\nPresencial (${c.nombre})\n${dia}⋅${horario}\nMoras 619, Col del Valle,  03104 CDMX.\n\nFormas de pago: ${urlPagos}`;
  } else {
    let linkLine = c.link ? `Google Meet: ${c.link}` : 'El link de tu sesión te será enviado en breve.';
    return `Hola! Te recordamos tu cita programada. Por favor, confírmanos tu asistencia por aquí. En caso de que no puedas asistir, te agradeceríamos avisarnos con anticipación para liberar el espacio y ofrecérselo a otro paciente que lo necesite. ¡Muchas gracias! \n\nOnline (${c.nombre})\n${dia}⋅${horario}\n${linkLine}\n\nFormas de pago: ${urlPagos}`;
  }
}

// ── NÚMERO DE WHATSAPP ──
// Construye el número E.164 (solo dígitos) para wa.me a partir del valor
// almacenado en la hoja. Es tolerante con datos viejos (10 dígitos) y nuevos
// (ya con lada de país), y corrige la doble lada "5252".
function waNumero(raw) {
  let d = String(raw || '').replace(/\D/g, '');
  if (!d) return '';
  while (d.startsWith('5252')) d = d.slice(2);   // arregla doble lada MX (52 52…)
  if (d.length === 11 && d.startsWith('1'))  return d;          // EE.UU./Canadá
  if (d.length === 13 && d.startsWith('521')) return d;         // MX móvil completo
  if (d.length === 12 && d.startsWith('52'))  return '521' + d.slice(-10); // MX sin el 1
  if (d.length >= 11) return d;                  // ya trae lada de país, respetar
  if (d.length === 10) return '521' + d;         // número nacional MX → +52 1
  return d;
}

      cardsWrap.appendChild(card);
    });

    lista.appendChild(g);
  });

  // Reaplicar filtro activo
  const fb = document.querySelector('.filter-btn.active');
  filtrar(filtroActual, fb, true);
  abrirPrimerDiaPendiente();
  pintarRegistros(); // botones de expediente/escalas (si ya cargaron)
}

// ── COPIAR NOMBRE ──
async function copiarNombre(e, nombre, btn) {
  e.preventDefault();
  try { await navigator.clipboard.writeText(nombre); }
  catch(_) {
    const ta = document.createElement('textarea');
    ta.value = nombre; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
  btn.classList.add('copied');
  btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  showToast('Nombre copiado');
  setTimeout(() => {
    btn.classList.remove('copied');
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  }, 2000);
}

// ── COPIAR LINK MEET ──
async function copiarLink(e, link, btn) {
  e.preventDefault();
  try { await navigator.clipboard.writeText(link); }
  catch(_) {
    const ta = document.createElement('textarea');
    ta.value = link; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
  btn.classList.add('copied');
  btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  showToast('Link Meet copiado');
  setTimeout(() => {
    btn.classList.remove('copied');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  }, 2000);
}

// ── COPIAR TEXTO ──
async function copiarTexto(idx, btn) {
  const c = CITAS[idx];
  const texto = generarTexto(c);
  try { await navigator.clipboard.writeText(texto); }
  catch(e) {
    const ta = document.createElement('textarea');
    ta.value = texto; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
  btn.textContent = '✓ Copiado';
  btn.classList.add('copied');
  marcarCopiado(c);
  showToast('Texto copiado');
}

async function prepararWA(idx) {
  const c = CITAS[idx];
  const texto = generarTexto(c);
  try {
    await navigator.clipboard.writeText(texto);
    showToast('Texto copiado — pégalo en WhatsApp');
  } catch(e) {}
  marcarCopiado(c);
  const cb = document.getElementById('copy-' + idx);
  if (cb) { cb.textContent = '✓ Copiado'; cb.classList.add('copied'); }
  advanceDayIfComplete(c.fecha);
}

// ── CONFIRMAR (manual) ──
function toggleConfirmadaCard(idx, btn) {
  const c = CITAS[idx];
  const nuevo = toggleConfirmada(c);
  btn.classList.toggle('active', nuevo);
  btn.title = nuevo ? 'Marcar como pendiente' : 'Marcar como confirmada';
  const card = btn.closest('.cita-card');
  if (card) card.classList.toggle('confirmada', nuevo);

  const confirmados = getLocalMap(CONFIRMED_KEY);
  const numConfirm  = CITAS.filter(x => confirmados[citaKey(x)]).length;
  document.getElementById('stat-confirmadas').textContent = numConfirm;
  showToast(nuevo ? '✓ Confirmada' : 'Marcada como pendiente');

  if (filtroActual === 'pendientes') {
    const fb = document.querySelector('.filter-btn.active');
    filtrar('pendientes', fb, true);
  }
}

// ── DÍAS COLAPSABLES ──
function toggleDay(group) { group.classList.toggle('collapsed'); }

function abrirPrimerDiaPendiente() {
  const groups = [...document.querySelectorAll('.day-group')].filter(g => !g.classList.contains('hidden'));
  let opened = false;
  for (const g of groups) {
    const btns = [...g.querySelectorAll('.btn-copy')].filter(b => !b.closest('.cita-card').classList.contains('hidden'));
    if (btns.length === 0) continue;
    if (btns.some(b => !b.classList.contains('copied'))) {
      g.classList.remove('collapsed');
      opened = true;
      break;
    } else {
      g.classList.add('day-done');
    }
  }
  if (!opened && groups.length) groups[0].classList.remove('collapsed');
}

function advanceDayIfComplete(fecha) {
  const groups = [...document.querySelectorAll('.day-group')].filter(g => !g.classList.contains('hidden'));
  let idx = -1;
  groups.forEach((g, i) => { if (g.dataset.fecha === fecha) idx = i; });
  if (idx === -1) return;
  const current = groups[idx];
  const btns = [...current.querySelectorAll('.btn-copy')].filter(b => !b.closest('.cita-card').classList.contains('hidden'));
  if (!btns.length || !btns.every(b => b.classList.contains('copied'))) return;
  current.classList.add('day-done', 'collapsed');
  const next = groups.slice(idx + 1).find(g => {
    const bs = [...g.querySelectorAll('.btn-copy')].filter(b => !b.closest('.cita-card').classList.contains('hidden'));
    return bs.some(b => !b.classList.contains('copied'));
  });
  if (next) {
    next.classList.remove('collapsed');
    setTimeout(() => next.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
    const label = (next.querySelector('.day-header')?.textContent || '').replace('▼','').replace(/\d+\s*citas?/i,'').replace(/\s+/g,' ').trim();
    showToast('→ ' + (label || 'Siguiente día'));
  } else {
    showToast('✓ Todos los días completados');
  }
}

// ── REFRESH ──
async function refrescarCitas() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  btn.disabled = true;
  await cargarYRenderizar();
  btn.classList.remove('spinning');
  btn.disabled = false;
  showToast('Citas actualizadas');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── FILTROS ──
function filtrar(valor, btn, silent) {
  filtroActual = valor;
  if (!silent) localStorage.setItem(FILTER_KEY, valor);
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn && btn.classList) btn.classList.add('active');

  const confirmados = getLocalMap(CONFIRMED_KEY);
  document.querySelectorAll('.cita-card').forEach(card => {
    const mod = card.dataset.modalidad;
    const k   = card.dataset.key;
    let visible = true;
    if (valor === 'Presencial' || valor === 'Online') visible = (mod === valor);
    else if (valor === 'pendientes') visible = !confirmados[k];
    card.classList.toggle('hidden', !visible);
  });

  document.querySelectorAll('.day-group').forEach(g => {
    const any = [...g.querySelectorAll('.cita-card')].some(c => !c.classList.contains('hidden'));
    g.classList.toggle('hidden', !any);
  });

  document.querySelectorAll('.day-group:not(.hidden)').forEach(g => g.classList.add('collapsed'));
  abrirPrimerDiaPendiente();
}
