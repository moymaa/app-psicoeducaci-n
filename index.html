<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psicoeducación · Eutimya</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#006A60">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eutimya">
    <link rel="apple-touch-icon" href="https://psiquiatra-cdmx.eutimya.org/favicon.png">

    <link rel="icon" type="image/png" href="https://psiquiatra-cdmx.eutimya.org/favicon.png"/>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Roboto+Flex:opsz,wght@8..144,300;8..144,400;8..144,500;8..144,600;8..144,700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ══ AQUÍ SOLO VA CSS ══ */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        :root{
            /* Primary (Teal) */
            --md-primary:#006A60;
            --md-on-primary:#fff;
            --md-primary-container:#9EF2E4;
            --md-on-primary-container:#00201C;

            /* Secondary */
            --md-secondary:#4A6360;
            --md-on-secondary:#fff;
            --md-secondary-container:#CCE8E4;
            --md-on-secondary-container:#051F1D;

            /* Tertiary (Amber) */
            --md-tertiary:#7A5230;
            --md-on-tertiary:#fff;
            --md-tertiary-container:#FFDBBE;
            --md-on-tertiary-container:#2E1400;

            /* Error */
            --md-error:#BA1A1A;
            --md-on-error:#fff;
            --md-error-container:#FFDAD6;
            --md-on-error-container:#410002;

            /* Surface scale */
            --md-background:#F4FAF8;
            --md-on-background:#161D1C;
            --md-surface:#F4FAF8;
            --md-on-surface:#161D1C;
            --md-surface-variant:#DAE5E2;
            --md-on-surface-variant:#3F4947;
            --md-surface-lowest:#fff;
            --md-surface-low:#EFF5F3;
            --md-surface-container:#E9F0EE;
            --md-surface-high:#E3EAE8;
            --md-surface-highest:#DEE5E3;

            /* Outline */
            --md-outline:#6F7978;
            --md-outline-variant:#BEC9C7;

            /* Elevations */
            --elev1:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
            --elev2:0 2px 6px rgba(0,0,0,.12),0 1px 3px rgba(0,0,0,.08);
            --elev3:0 4px 12px rgba(0,0,0,.12),0 2px 4px rgba(0,0,0,.08);

            /* Shape */
            --r-none:0;
            --r-xs:4px;
            --r-sm:8px;
            --r-md:12px;
            --r-lg:16px;
            --r-xl:28px;
            --r-full:50px;

            /* Alises */
            --teal:var(--md-primary);
            --forest:#00413B;
            --amber:var(--md-tertiary);
            --ink:var(--md-on-background);
            --slate:var(--md-on-surface-variant);
            --mist:#6F7978;
            --mint:var(--md-primary-container);
            --cream:var(--md-tertiary-container);
            --pale:var(--md-background);
            --wh:#fff;
            --br:var(--md-outline-variant);
            --br2:rgba(0,106,96,.25);
        }

        /* ══ BASE ══ */
        html{scroll-behavior:smooth}
        body{
            font-family:'Roboto',sans-serif;
            background:var(--md-background);
            color:var(--md-on-background);
            font-size:14px;
            line-height:1.6;
            min-height:100vh;
        }

        /* [El resto de tu CSS se mantiene igual...] */
        header{position:sticky;top:0;z-index:200;background:var(--md-surface-lowest);border-bottom:1px solid var(--md-outline-variant);box-shadow:var(--elev1)}
        .hi{max-width:1120px;margin:0 auto;padding:0 1rem;height:64px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
        .hb{display:flex;align-items:center;gap:10px}
        .app-icon{width:40px;height:40px;border-radius:var(--r-md);background:var(--md-primary-container);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
        .hlogo{font-family:'Roboto Flex',sans-serif;font-size:1.35rem;font-weight:600;color:var(--md-on-background);letter-spacing:-.01em}
        .hlogo span{color:var(--md-primary)}
        .hsub{color:var(--md-on-surface-variant);font-size:.7rem;font-weight:400;letter-spacing:.06em;margin-top:1px}
        .hcrisis{background:var(--md-error-container);color:var(--md-on-error-container);font-size:11.5px;font-weight:500;padding:6px 14px;border-radius:var(--r-full);white-space:nowrap;border:1px solid rgba(186,26,26,.18)}
        .nav-wrap{position:relative;background:var(--md-surface-lowest);border-bottom:1px solid var(--md-outline-variant)}
        nav{overflow-x:auto;scrollbar-width:none}
        nav::-webkit-scrollbar{display:none}
        .ni{max-width:1120px;margin:0 auto;padding:0 .5rem;display:flex;gap:2px}
        .tab{background:none;border:none;font-family:'Roboto',sans-serif;font-size:12px;font-weight:500;color:var(--md-on-surface-variant);padding:12px 16px;cursor:pointer;transition:color .2s,background .2s;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase;border-radius:var(--r-full);position:relative}
        .tab:hover{background:rgba(0,106,96,.06);color:var(--md-primary)}
        .tab.on{color:var(--md-primary);font-weight:700}
        .tab.on::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:60%;height:3px;background:var(--md-primary);border-radius:3px 3px 0 0}
        .nav-fade-r{position:absolute;right:0;top:0;bottom:0;width:48px;background:linear-gradient(to left,var(--md-surface-lowest) 40%,transparent);pointer-events:none;z-index:10;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
        .nav-arrow{display:flex;align-items:center;gap:2px;animation:nudge 1.6s ease-in-out infinite}
        .nav-arrow span{width:4px;height:4px;border-radius:50%;background:var(--md-primary);opacity:.5}
        .nav-arrow span:nth-child(1){animation:dot 1.6s ease-in-out infinite 0s}
        .nav-arrow span:nth-child(2){animation:dot 1.6s ease-in-out infinite .18s}
        .nav-arrow span:nth-child(3){animation:dot 1.6s ease-in-out infinite .36s}
        @keyframes dot{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:.7;transform:scale(1.2)}}
        @keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(3px)}}
        .nav-fade-r.hidden{display:none}
        main{max-width:1120px;margin:0 auto;padding:1.5rem 1rem 5rem}
        .sec{display:none;animation:fadeUp .28s ease}.sec.on{display:block}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        h1{font-family:'Roboto Flex',sans-serif;font-size:2.6rem;font-weight:600;line-height:1.1;letter-spacing:-.02em;color:var(--md-on-background)}
        h2{font-family:'Roboto Flex',sans-serif;font-size:1.65rem;font-weight:500;color:var(--md-on-background);line-height:1.25;margin-bottom:.5rem;letter-spacing:-.01em}
        h3{font-size:.95rem;font-weight:600;color:var(--md-on-background);margin-bottom:.35rem}
        h4{font-size:.65rem;font-weight:600;color:var(--md-primary);text-transform:uppercase;letter-spacing:.13em;margin-bottom:.5rem}
        p{color:var(--md-on-surface-variant);margin-bottom:.85rem;font-weight:400}
        p:last-child{margin-bottom:0}
        .lead{font-size:1rem;color:var(--md-on-background);font-weight:400;line-height:1.75}
        strong{color:var(--md-on-background);font-weight:600}
        .mb{margin-bottom:1.25rem}.sh{margin-bottom:1.5rem}
        .card{background:var(--md-surface-lowest);border-radius:var(--r-xl);border:1px solid var(--md-outline-variant);padding:1.75rem;box-shadow:var(--elev1)}
        .card-tonal{background:var(--md-surface-container);border-radius:var(--r-xl);padding:1.75rem;border:none}
        .card-filled{background:var(--md-primary-container);border-radius:var(--r-xl);padding:1.75rem;border:none}
        .g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(295px,1fr));gap:1rem}
        .hero{background:var(--md-on-background);border-radius:var(--r-xl);padding:3rem 2.5rem;margin-bottom:1.25rem;position:relative;overflow:hidden}
        .hero::before{content:'';position:absolute;top:-100px;right:-80px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(158,242,228,.15) 0%,transparent 65%);pointer-events:none}
        .hbadge{display:inline-flex;align-items:center;gap:6px;background:rgba(158,242,228,.18);border:1px solid rgba(158,242,228,.35);color:var(--md-primary-container);font-size:.65rem;font-weight:600;padding:5px 14px;border-radius:var(--r-full);margin-bottom:1.25rem;letter-spacing:.1em;text-transform:uppercase}
        .hero h1{color:#fff;font-size:2.5rem;margin-bottom:.85rem;max-width:560px}
        .hero h1 em{font-style:normal;color:var(--md-primary-container)}
        .hero p{color:rgba(255,255,255,.55);font-size:.93rem;max-width:500px;margin-bottom:0}
        .hbtns{display:flex;gap:.75rem;margin-top:1.75rem;flex-wrap:wrap}
        .btn{font-family:'Roboto',sans-serif;font-size:13px;font-weight:500;padding:10px 24px;border-radius:var(--r-full);cursor:pointer;transition:all .18s;border:none;letter-spacing:.02em}
        .bg{background:var(--md-primary);color:var(--md-on-primary)}
        .bg:hover{filter:brightness(1.1);box-shadow:var(--elev2)}
        .bo{background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.2)}
        .bo:hover{background:rgba(255,255,255,.14)}
        .btn-tonal{background:var(--md-secondary-container);color:var(--md-on-secondary-container);border:none}
        .btn-tonal:hover{filter:brightness(.97);box-shadow:var(--elev1)}
        .btn-outlined{background:transparent;color:var(--md-primary);border:1.5px solid var(--md-outline)}
        .btn-outlined:hover{background:rgba(0,106,96,.06)}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.875rem;margin-bottom:1.25rem}
        .stat{background:var(--md-surface-lowest);border-radius:var(--r-lg);border:1px solid var(--md-outline-variant);padding:1rem;text-align:center;box-shadow:var(--elev1)}
        .stn{font-family:'Roboto Flex',sans-serif;font-size:2rem;color:var(--md-tertiary);font-weight:600}
        .stl{font-size:.67rem;color:var(--md-on-surface-variant);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
        .cot{background:var(--md-secondary-container);border-radius:var(--r-md);padding:1rem 1.35rem;margin:1rem 0}
        .cot.am{background:var(--md-tertiary-container)}
        .cot-t{font-weight:600;color:var(--md-on-secondary-container);font-size:.87rem;margin-bottom:.28rem}
        .cot.am .cot-t{color:var(--md-on-tertiary-container)}
        .cot p{font-size:.83rem;margin:0;color:var(--md-on-secondary-container);font-weight:400}
        .cot.am p{color:var(--md-on-tertiary-container)}
        .bgrid{display:grid;grid-template-columns:1fr 1fr;border-radius:var(--r-xl);overflow:hidden;border:1px solid var(--md-outline-variant)}
        .bp{padding:1.5rem}.bp.h{background:rgba(158,242,228,.15)}.bp.d{background:rgba(255,219,190,.2)}
        .btag{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.85rem;display:flex;align-items:center;gap:5px}
        .btag.h{color:var(--md-primary)}.btag.d{color:var(--md-tertiary)}
        .bdots{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.75rem}
        .dot{border-radius:50%}.don{background:var(--md-primary)}.doff{background:rgba(0,106,96,.12)}.dal{background:var(--md-tertiary)}
        .bdes{font-size:.78rem;color:var(--md-on-surface-variant);font-weight:400}
        .mrow{display:flex;align-items:flex-start;gap:.875rem;padding:.85rem 0;border-bottom:1px solid var(--md-outline-variant)}.mrow:last-child{border-bottom:none}
        .mic{width:36px;height:36px;background:var(--md-primary-container);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
        .mn{font-weight:500;font-size:.87rem;color:var(--md-on-background)}.md{font-size:.77rem;color:var(--md-on-surface-variant);margin-top:1px;font-weight:400}
        .irow{display:grid;grid-template-columns:auto 1fr;gap:.4rem .85rem;align-items:start;padding:.58rem 0;border-bottom:1px solid var(--md-outline-variant)}.irow:last-child{border-bottom:none}
        .ik{font-size:.67rem;font-weight:600;color:var(--md-primary);text-transform:uppercase;letter-spacing:.07em;padding-top:2px;white-space:nowrap}
        .iv{font-size:.83rem;color:var(--md-on-surface-variant);font-weight:400}
        .tube-wrap{position:relative;margin:1.25rem 0}
        .tube-track{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:.875rem;scrollbar-width:thin;scrollbar-color:var(--md-outline-variant) transparent;-webkit-overflow-scrolling:touch}
        .tube-track::-webkit-scrollbar{height:3px}.tube-track::-webkit-scrollbar-thumb{background:var(--md-outline-variant);border-radius:4px}
        .slide{flex:0 0 320px;scroll-snap-align:start;background:var(--md-surface-lowest);border:1px solid var(--md-outline-variant);border-radius:var(--r-xl);padding:1.5rem;box-shadow:var(--elev1);transition:transform .2s,box-shadow .2s}
        .slide:hover{transform:translateY(-2px);box-shadow:var(--elev3)}
        .slide-num{font-family:'Roboto Flex',sans-serif;font-size:2.2rem;color:var(--md-outline-variant);font-weight:700;line-height:1;margin-bottom:.45rem}
        .slide-title{font-weight:600;font-size:.9rem;color:var(--md-on-background);margin-bottom:.55rem}
        .slide-body{font-size:.8rem;color:var(--md-on-surface-variant);font-weight:400;line-height:1.65}
        .slide.dark{background:var(--md-on-background);border-color:rgba(158,242,228,.15)}
        .slide.dark .slide-num{color:rgba(158,242,228,.2)}.slide.dark .slide-title{color:#fff}.slide.dark .slide-body{color:rgba(255,255,255,.52)}
        .slide.amber{background:var(--md-tertiary-container);border-color:rgba(122,82,48,.15)}
        .slide.amber .slide-num{color:rgba(122,82,48,.18)}.slide.amber .slide-title{color:var(--md-on-tertiary-container)}.slide.amber .slide-body{color:rgba(46,20,0,.65)}
        .tube-hint{text-align:center;font-size:.67rem;color:var(--md-on-surface-variant);letter-spacing:.08em;text-transform:uppercase;margin-top:.2rem}
        .dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:1rem}
        .dc{background:var(--md-surface-lowest);border:1px solid var(--md-outline-variant);border-radius:var(--r-xl);padding:1.5rem;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;box-shadow:var(--elev1)}
        .dc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r-xl) var(--r-xl) 0 0}
        .dc.tc::before{background:var(--md-primary)}.dc.am::before{background:var(--md-tertiary)}.dc.ro::before{background:var(--md-error)}.dc.bl::before{background:#1565C0}
        .dc:hover{box-shadow:var(--elev3);transform:translateY(-1px)}.dc.act{border-color:var(--md-primary);box-shadow:var(--elev2)}
        .di{font-size:1.6rem;margin-bottom:.52rem}.dn{font-weight:600;font-size:.9rem;color:var(--md-on-background);margin-bottom:.28rem}.dtg{font-size:.68rem;color:var(--md-on-surface-variant);margin-bottom:.62rem;font-weight:400}
        .dd{display:none;border-top:1px solid var(--md-outline-variant);margin-top:.85rem;padding-top:.85rem}.dc.act .dd{display:block}
        .dd p{font-size:.8rem;margin-bottom:.52rem;font-weight:400}
        .dex{background:var(--md-primary-container);border-radius:var(--r-md);padding:.78rem .95rem;font-size:.77rem;color:var(--md-on-primary-container);font-style:italic;margin-bottom:.55rem;line-height:1.6}
        .dct{background:var(--md-tertiary-container);border-radius:var(--r-md);padding:.78rem .95rem;font-size:.77rem;color:var(--md-on-tertiary-container)}
        .dct strong{display:block;font-size:.63rem;text-transform:uppercase;letter-spacing:.09em;margin-bottom:.28rem;color:var(--md-tertiary)}
        .soc{background:var(--md-on-background);border-radius:var(--r-xl);padding:1.5rem 1.75rem;margin-top:1.5rem}
        .sq{display:flex;align-items:flex-start;gap:.62rem;padding:.58rem 0;border-bottom:1px solid rgba(255,255,255,.07)}.sq:last-child{border-bottom:none}
        .sqn{width:22px;height:22px;background:rgba(158,242,228,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:700;color:var(--md-primary-container);flex-shrink:0;margin-top:1px}
        .sq p{font-size:.8rem;color:rgba(255,255,255,.55);margin:0;font-weight:400}
        .sleep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:.875rem;margin-bottom:1.25rem}
        .sleep-card{background:var(--md-surface-lowest);border:1px solid var(--md-outline-variant);border-radius:var(--r-lg);padding:1.2rem;box-shadow:var(--elev1)}
        .sleep-num{width:28px;height:28px;background:var(--md-primary-container);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--md-on-primary-container);flex-shrink:0;margin-bottom:.55rem}
        .pt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem;margin-bottom:1.25rem}
        .pt{background:var(--md-surface-lowest);border:1px solid var(--md-outline-variant);border-radius:var(--r-xl);padding:1.5rem;box-shadow:var(--elev1)}
        .pt-tag{display:inline-flex;align-items:center;gap:5px;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:4px 12px;border-radius:var(--r-full);margin-bottom:.82rem}
        .pt-teal{background:var(--md-primary-container);color:var(--md-on-primary-container)}
        .pt-amber{background:var(--md-tertiary-container);color:var(--md-on-tertiary-container)}
        .pt-slate{background:var(--md-surface-high);color:var(--md-on-surface-variant)}
        .pt h3{font-size:.88rem;margin-bottom:.42rem}.pt-desc{font-size:.78rem;color:var(--md-on-surface-variant);margin-bottom:.85rem;font-weight:400}
        .prompt-box{background:var(--md-on-background);border-radius:var(--r-md);padding:.95rem 1.1rem;font-size:.72rem;font-family:'Roboto Mono',monospace;color:rgba(255,255,255,.65);line-height:1.78;position:relative;word-break:break-word}
        .prompt-box .hl{color:var(--md-primary-container);font-weight:600}.prompt-box .hlA{color:var(--md-tertiary-container)}
        .copy-btn{position:absolute;top:.5rem;right:.5rem;background:rgba(158,242,228,.12);border:1px solid rgba(158,242,228,.2);color:rgba(255,255,255,.52);font-size:.58rem;padding:4px 9px;border-radius:var(--r-full);cursor:pointer;font-family:'Roboto',sans-serif;transition:all .15s;white-space:nowrap;font-weight:500}
        .copy-btn:hover{background:rgba(158,242,228,.2);color:rgba(255,255,255,.82)}.copy-btn.done{color:var(--md-primary-container)}
        .rule-box{background:var(--md-tertiary-container);border-radius:var(--r-md);padding:.82rem 1.05rem;margin-top:.65rem}
        .rule-box p{font-size:.76rem;color:var(--md-on-tertiary-container);margin:0;font-weight:400}
        .warn-box{background:var(--md-error-container);border-radius:var(--r-md);padding:.82rem 1.05rem;margin-top:.65rem}
        .warn-box p{font-size:.76rem;color:var(--md-on-error-container);margin:0;font-weight:400}
        .guide-intro{background:var(--md-on-background);border-radius:var(--r-xl);padding:2.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
        .guide-intro::before{content:'';position:absolute;top:-80px;right:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(158,242,228,.1) 0%,transparent 65%);pointer-events:none}
        .guide-intro h2{color:#fff;margin-bottom:.6rem;position:relative}
        .guide-intro p{color:rgba(255,255,255,.45);font-size:.9rem;max-width:540px;position:relative;font-weight:400}
        .guide-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:1rem}
        .gc{background:var(--md-surface-lowest);border:1px solid var(--md-outline-variant);border-radius:var(--r-xl);padding:1.5rem;transition:box-shadow .2s,transform .2s;box-shadow:var(--elev1)}
        .gc:hover{box-shadow:var(--elev3);transform:translateY(-1px)}
        .gc-num{font-family:'Roboto Flex',sans-serif;font-size:2.6rem;color:var(--md-outline-variant);font-weight:700;line-height:1;margin-bottom:.32rem}
        .gc-title{font-weight:600;font-size:.88rem;color:var(--md-on-background);margin-bottom:.55rem}
        .gc-body{font-size:.8rem;color:var(--md-on-surface-variant);font-weight:400;line-height:1.7}
        .gc.dark{background:var(--md-on-background);border-color:rgba(158,242,228,.12)}
        .gc.dark .gc-num{color:rgba(158,242,228,.18)}.gc.dark .gc-title{color:#fff}.gc.dark .gc-body{color:rgba(255,255,255,.52)}.gc.dark strong{color:var(--md-primary-container)}
        .gc.amber{background:var(--md-tertiary-container);border-color:rgba(122,82,48,.12)}
        .gc.amber .gc-num{color:rgba(122,82,48,.15)}.gc.amber .gc-title{color:var(--md-on-tertiary-container)}.gc.amber .gc-body{color:rgba(46,20,0,.65)}

        .bd-science{font-size:.76rem;color:var(--md-on-surface-variant);font-weight:400;line-height:1.6;margin-bottom:.55rem;padding:.55rem .7rem;background:var(--md-secondary-container);border-radius:var(--r-md);border-left:3px solid var(--md-primary)}
        .bd-tag{display:inline-block;font-size:.65rem;font-weight:600;padding:5px 12px;border-radius:var(--r-full)}
        .nt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.65rem}
        .nt-card{border-radius:var(--r-lg);background:var(--md-surface-lowest);border:1px solid var(--md-outline-variant);cursor:pointer;transition:all .22s;overflow:hidden;box-shadow:var(--elev1)}

        .nt-card.open .nt-tap{display:none}

        .ss-text{font-size:.8rem;color:var(--md-on-surface-variant);font-weight:400;line-height:1.6}

        .ss-arrow{text-align:center;color:var(--md-on-surface-variant);font-size:1rem;line-height:1;margin:.1rem 0}
        .glass-toggle-group{display:flex;flex-direction:column;gap:13px;margin:1rem 0}
        .glass-toggle{--tw:52px;--th:30px;--ts:22px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
        .toggle-input{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
        .toggle-track{position:relative;width:var(--tw);height:var(--th);border-radius:var(--r-full);overflow:hidden;flex-shrink:0;transition:background .28s;background:var(--md-surface-variant);border:2px solid var(--md-outline)}
        .toggle-thumb{position:absolute;z-index:4;top:50%;transform:translateY(-50%) translateX(2px);width:var(--ts);height:var(--ts);border-radius:50%;background:var(--md-outline);box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .28s cubic-bezier(.4,0,.2,1),background .28s,width .15s}
        .toggle-input:checked~.toggle-track{background:var(--md-primary);border-color:var(--md-primary)}
        .toggle-input:checked~.toggle-track .toggle-thumb{transform:translateY(-50%) translateX(calc(var(--tw) - var(--ts) - 6px));background:#fff}
        .toggle-label{font-size:.84rem;font-weight:400;color:var(--md-on-surface-variant)}
        .toggle-input:checked~.toggle-track~.toggle-label{color:var(--md-on-background);font-weight:500}
        .fab-sos{position:fixed;bottom:24px;right:24px;background:var(--md-error);color:#fff;width:56px;height:56px;border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 4px 12px rgba(186,26,26,.4),0 8px 20px rgba(186,26,26,.2);cursor:pointer;z-index:999;text-decoration:none;transition:all .2s ease}

<body>

<header>

      </div>
    </div>

<div class="nav-wrap">
  <nav id="mainNav">

      <button class="tab on" onclick="show('neuro',this)">Tu cerebro</button>
      <button class="tab" onclick="show('dist',this)">Distorsiones</button>
      <button class="tab" onclick="show('creencias',this)">Creencias</button>

      <button class="tab" onclick="show('sueno',this)">Sueño</button>
      <button class="tab" onclick="show('ia',this)">IA terapéutica</button>
      <button class="tab" onclick="show('guia',this)">Guía del mes</button>
      <button class="tab" onclick="show('red',this)">Red terapéutica</button>
      <button class="tab" onclick="show('seguridad',this)">Plan de seguridad</button>
    </div>
  </nav>
  <div class="nav-fade-r" id="navFade"><div class="nav-arrow"><span></span><span></span><span></span></div></div>
</div>

<main>
    </main>

<a href="#seguridad" class="fab-sos" onclick="show('seguridad', document.querySelectorAll('.tab')[8])" title="Plan de Seguridad / Emergencia">🚨</a>

<script>
/* ══ TUS FUNCIONES EXISTENTES ══ */
function show(id,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

function makeDots(id,arr){
  const c=document.getElementById(id);
  arr.forEach(t=>{
    const d=document.createElement('div');d.className='dot '+t;
    const s=t==='don'?13:t==='dal'?15:9;
    d.style.cssText=`width:${s}px;height:${s}px`;
    c.appendChild(d);
  });
}
makeDots('dh',Array(28).fill('don'));
makeDots('dd',[...Array(22).fill('doff'),'dal','dal','dal','dal','dal','dal']);

const dists=[
  {n:'Catastrofismo',ic:'⚡',tg:'Ansiedad · Anticipación',cl:'tc',desc:'El cerebro anticipa el peor escenario como mecanismo de defensa fallido.',ex:'"Me duele la cabeza desde ayer. Seguramente tengo un tumor."',ct:'Reestructuración socrática',cm:'¿Cuántas veces antes tuviste dolor de cabeza y el resultado fue un tumor?'},
  {n:'Falacia de justicia',ic:'⚖️',tg:'Ira · Resentimiento',cl:'am',desc:'La creencia rígida de que el mundo debe operar bajo las propias normas de equidad.',ex:'"Yo siempre llego a tiempo y no me reconocen."',ct:'Perspectiva clínica',cm:'¿Cuánta energía consumes siendo el auditor de la justicia ajena?'},
  {n:'Razonamiento emocional',ic:'🌊',tg:'Ansiedad · TLP',cl:'ro',desc:'"Si lo siento, debe ser cierto."',ex:'"Siento que mi pareja me va a dejar."',ct:'La distinción clave',cm:'Las emociones son datos de tu estado interno, no hechos externos.'},
  {n:'Rumiación',ic:'🔁',tg:'Depresión · Culpa',cl:'bl',desc:'El ciclo compulsivo de darle vueltas a errores pasados.',ex:'"No debí haber dicho eso."',ct:'Autocompasión',cm:'¿Le dirías esas palabras exactas a alguien que quieres?'},
  {n:'Lectura de la mente',ic:'🔮',tg:'Ansiedad social',cl:'tc',desc:'La suposición de que sabes con certeza lo que otros piensan.',ex:'"Mi jefe no me saludó, claramente está enojado."',ct:'La regla de la evidencia',cm:'¿Tu jefe te dijo que está molesto o construiste una narrativa?'},
  {n:'Los "debería"',ic:'📏',tg:'Perfeccionismo',cl:'am',desc:'Una red rígida de reglas internas sobre comportamiento.',ex:'"Debería poder manejar esto solo."',ct:'Flexibilidad',cm:'Reemplazar "debería" por "preferiría" reduce la presión.'}
];

function buildDist(){
  const g=document.getElementById('dg');
  if(!g) return;
  dists.forEach(d=>{
    const el=document.createElement('div');el.className=`dc ${d.cl}`;
    el.innerHTML=`<div class="di">${d.ic}</div><div class="dn">${d.n}</div><div class="dtg">${d.tg}</div><div class="dd"><p>${d.desc}</p><div class="dex">${d.ex}</div><div class="dct"><strong>${d.ct}&nbsp;</strong>${d.cm}</div></div>`;
    el.onclick=()=>{const was=el.classList.contains('act');document.querySelectorAll('.dc').forEach(c=>c.classList.remove('act'));if(!was)el.classList.add('act');};
    g.appendChild(el);
  });
}
buildDist();

const quizData=[
  {thought:'Mi jefe no me contestó el correo. Seguro ya no le importa mi trabajo.',dist:'Lectura de la mente',label:'ql-teal',explain:'Asumes saber qué piensa tu jefe.',alt:'Mi jefe puede estar ocupado.'},
  {thought:'Reprobé el examen. Soy un fracaso.',dist:'Etiquetado',label:'ql-amber',explain:'Un evento se transforma en etiqueta global.',alt:'Reprobé este examen específico.'}
];

function buildQuiz(){
  const w=document.getElementById('quiz-wrap');if(!w)return;
  quizData.forEach(q=>{
    const el=document.createElement('div');el.className='quiz-card';
    el.innerHTML=`<div class="quiz-thought">${q.thought}</div><div class="quiz-reveal"><div class="quiz-label ${q.label}">${q.dist}</div><div class="quiz-explain">${q.explain}</div><div class="quiz-alt"><strong>Pensamiento alternativo</strong>${q.alt}</div></div>`;
    el.onclick=()=>{el.classList.toggle('open');};
    w.appendChild(el);
  });
}
buildQuiz();

function copyP(id,btn){
  const box=document.getElementById(id);
  const text=box.innerText.replace('Copiar y abrir IA','').replace('✓ ¡Listo!','').trim();
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✓ ¡Listo!';btn.classList.add('done');
    setTimeout(()=>{
      window.open(`https://chatgpt.com/?q=${encodeURIComponent(text)}`,'_blank');
      btn.textContent='Copiar y abrir IA';btn.classList.remove('done');
    },1000);
  });
}

function showBrain(id){
  document.querySelectorAll('.brain-detail').forEach(d=>d.style.display='none');
  document.querySelector('.brain-welcome').style.display='none';
  const el=document.getElementById('bd-'+id);
  if(el){el.style.display='block';}
  document.querySelectorAll('.bzone').forEach(z=>z.style.opacity='0.4');
  const zone=document.getElementById('bz-'+id);
  if(zone){zone.style.opacity='1';}
}

(function(){
  const nav=document.getElementById('mainNav');
  const fade=document.getElementById('navFade');
  if(!nav||!fade)return;
  function check(){
    const maxScroll=nav.scrollWidth-nav.clientWidth;
    if(maxScroll<=4){fade.classList.add('hidden');return;}
    fade.classList.toggle('hidden',nav.scrollLeft>=maxScroll-4);
  }
  nav.addEventListener('scroll',check,{passive:true});
  window.addEventListener('resize',check);
  check();
})();

document.addEventListener('DOMContentLoaded',()=>{
  const toggles=document.querySelectorAll('.toggle-input');
  toggles.forEach((toggle,index)=>{
    try{
      const savedState=localStorage.getItem(`eutimya_task_${index}`);
      if(savedState==='true'){toggle.checked=true;}
    }catch(e){}
    toggle.addEventListener('change',(e)=>{
      try{localStorage.setItem(`eutimya_task_${index}`,e.target.checked);}catch(e){}
    });
  });
});
</script>

<script>
  /* ══ REGISTRO DE SERVICE WORKER PARA PWA ══ */

      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Eutimya PWA lista.'))
        .catch(err => console.log('Error de registro', err));
    });
  }
</script>
